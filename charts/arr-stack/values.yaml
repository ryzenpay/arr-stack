timezone: Etc/UTC

puid: 1000
pgid: 1000

ingress:
  enabled: true
  className: traefik
  domain: media.example.com
  annotations: {}

qbittorrent:
  config:
    web_port: 8080
    torrenting_port: 51820
    configMap: "" # configmap
  persistent:
    enabled: true
    size: 100Gi
    storageClass: ""
  vpn:
    enabled: true
    type: gluetun  # gluetun | tailscale
    gluetun:
      healthcheck: true
      config:
        service_provider: mullvad
        type: wireguard
        dns: 1.1.1.1
        cities: "" #https://raw.githubusercontent.com/qdm12/gluetun/master/internal/storage/servers.json
      secret:
        existing: true
        name: arr-config-secret
        privateKeySecretKey: WIREGUARD_PRIVATE_KEY
        privateKey: ""
        addressesSecretKey: WIREGUARD_ADDRESSES
        addresses: ""
    tailscale:
      loginServer: "https://script.ryzen.me"
      exitNode: "mullvad"
      exitNodeAllowLanAccess: true
      hostname: "arr-qbit"
      acceptDns: true
      secret:
        existing: true
        name: arr-config-secret
        tokenKey: headscale-token
        token: ""
      state:
        storageClass: ""
        size: 100Mi
  extraEnv: {}
  extraContainers: []
  # - name: my-sidecar
  #   image: my-image:latest
  #   env:
  #     - name: FOO
  #       value: bar
  lifecycle:
    postStart:
      exec:
        command:
          - "/bin/sh"
          - "-c"
          - |
            CONFIG_FILE="/config/qBittorrent/qBittorrent.conf"
            echo "Waiting for $CONFIG_FILE to exist..."
            for i in $(seq 1 40); do
              if [ -f "$CONFIG_FILE" ]; then
                break
              fi
              sleep 0.5
            done
            echo "Config found. Patching WebUI\LocalHostAuth..."
            # If setting exists, replace it; otherwise append after [Preferences]
            if grep -Fq "WebUI\LocalHostAuth=" "$CONFIG_FILE"; then
              sed -i 's|WebUI\\LocalHostAuth=.*|WebUI\\LocalHostAuth=false|' "$CONFIG_FILE"
            else
              sed -i '/^\[Preferences\]/a WebUI\\LocalHostAuth=false' "$CONFIG_FILE"
            fi

arr:
  persistent:
    existing: false
    size: 100Gi
    storageClass: ""
  config:
    existing: false
    storageClass: ""
    size: 1Gi
  
metrics:
  enabled: false
  podAnnotations: {}

discord:
  enabled: false
  secret:
    existing: true
    name: arr-secret
    tokenSecretKey: DISCORD_TOKEN
    token: ""

swaparr:
  enabled: false
  maxStrikes: 3
  scanInterval: 10m
  maxDownloadTime: 2h
  ignoreAboveSize: 50GB
  removeFromClient: true
  strikeQueued: false
